<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A community builder app for the Akhil Bhartiya Kushwaha Mahasabha community. Connect, share, and stay updated with community events.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Akhil Bhartiya Kushwaha Mahasabha">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://abkm.futurelab.co.in/">
  <meta property="og:title" content="Akhil Bhartiya Kushwaha Mahasabha">
  <meta property="og:description" content="Connect, share, and stay updated with Akhil Bhartiya Kushwaha Mahasabha community events.">
  <meta property="og:image" content="favicon.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://abkm.futurelab.co.in/">
  <meta property="twitter:title" content="Akhil Bhartiya Kushwaha Mahasabha">
  <meta property="twitter:description" content="Connect, share, and stay updated with Akhil Bhartiya Kushwaha Mahasabha community events.">
  <meta property="twitter:image" content="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Akhil Bhartiya Kushwaha Mahasabha</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-indicator">
    <style>
      body {
        background-color: #ffffff;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #loading-indicator {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #FF5722;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
